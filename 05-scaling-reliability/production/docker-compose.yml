# ============================================================
# Scaling Demo: Agent Instances + Redis + Nginx Load Balancer
#
# Run from this folder:
#   docker compose up --build --scale agent=3
# Test:
#   python test_stateless.py
# ============================================================

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=demo
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - agent_net

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - agent_net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agent_net

volumes:
  redis_data:

networks:
  agent_net:
    driver: bridge
