# Render Blueprint for the Day 12 cloud deployment demo.
# Render is the preferred platform for this lab.

services:
  - type: web
    name: ai-agent-render
    runtime: python
    region: singapore
    plan: free
    rootDir: 03-cloud-deployment/render
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: AGENT_API_KEY
        generateValue: true
